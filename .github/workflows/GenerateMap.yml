name: Build & Deploy Station Map

on:
  push:
    branches: [main] # adjust to your default branch
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: "map-data"
  cancel-in-progress: true

jobs:
  build-and-push-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        persist-credentials: false


      - name: Checkout disdrodb-webmap repo
        uses: actions/checkout@v4
        with:
          repository: ltelab/disdrodb-webmap
          token: ${{ secrets.DISDRODB_WEBMAP_TOKEN }}
          path: disdrodb-webmap
          fetch-depth: 0
          
      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: ci/environment_map.yml
          create-args: >-
            python=3.11
          cache-downloads: true
          cache-env: true
          init-shell: bash

      - name: Generate JSON files into disdrodb-webmap/public/data
        shell: bash -l {0}
        env:
          OUTPUT_DIR: disdrodb-webmap/public/data
        run: |
          python .github/scripts/generate_map_json_data.py
          test -f disdrodb-webmap/public/data/stations.json
          test -f disdrodb-webmap/public/data/filter-options.json
          ls -lah disdrodb-webmap/public/data
          
      - name: Commit & push JSON updates to disdrodb-webmap
        shell: bash
        run: |
          cd disdrodb-webmap
          git status --porcelain

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/stations.json public/data/filter-options.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
	
	  git commit -m "Update webmap data — $(date -u +'%Y-%m-%dT%H:%M:%SZ') [skip ci]"
 
          git push origin HEAD:main
